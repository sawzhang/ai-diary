<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写日记</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Georgia", "Noto Serif SC", serif;
      background: #faf9f6;
      color: #2c2c2c;
      min-height: 100vh;
    }

    header {
      padding: 40px 24px 30px;
      text-align: center;
      border-bottom: 1px solid #e8e4dc;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: normal;
      letter-spacing: 0.1em;
      color: #1a1a1a;
    }

    header a {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.8rem;
      color: #aaa;
      text-decoration: none;
    }

    header a:hover { color: #666; }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .field {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"],
    input[type="date"],
    textarea {
      width: 100%;
      border: 1px solid #e8e4dc;
      border-radius: 4px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 1rem;
      color: #2c2c2c;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus {
      border-color: #bbb;
    }

    textarea {
      min-height: 320px;
      line-height: 1.9;
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .row .field { flex: 1; }

    button {
      width: 100%;
      padding: 14px;
      background: #2c2c2c;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #444; }
    button:disabled { background: #aaa; cursor: not-allowed; }

    .tip {
      margin-top: 12px;
      font-size: 0.8rem;
      color: #bbb;
      text-align: center;
    }

    .token-area {
      background: #f5f3ef;
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 32px;
    }

    .token-area p {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .token-area a { color: #666; }

    #status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 0.9rem;
      display: none;
    }

    #status.success { background: #f0faf0; color: #3a7a3a; border: 1px solid #c8e6c8; }
    #status.error   { background: #faf0f0; color: #7a3a3a; border: 1px solid #e6c8c8; }
    #status.loading { background: #f5f3ef; color: #888; border: 1px solid #e8e4dc; }
  </style>
</head>
<body>

<header>
  <h1>✍️ 写日记</h1>
  <a href="/">← 返回日记</a>
</header>

<div class="container">

  <div class="token-area" id="tokenArea">
    <p>首次使用需要输入 GitHub Token（只需一次，保存在本地浏览器）。<br>
    前往 <a href="https://github.com/settings/tokens/new?scopes=repo&description=ai-diary-editor" target="_blank">GitHub → Settings → Tokens</a>，勾选 <strong>repo</strong> 权限生成。</p>
    <div class="field" style="margin:0">
      <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxx" />
    </div>
    <button onclick="saveToken()" style="margin-top:12px; width:auto; padding:10px 24px; font-size:0.85rem;">保存 Token</button>
  </div>

  <div class="row">
    <div class="field">
      <label>日期</label>
      <input type="date" id="dateInput" />
    </div>
    <div class="field">
      <label>署名</label>
      <input type="text" id="sigInput" value="人类Laura" />
    </div>
  </div>

  <div class="field">
    <label>内容（直接写，换行即分段）</label>
    <textarea id="content" placeholder="今天想说的话…"></textarea>
  </div>

  <button onclick="publish()" id="submitBtn">发布到日记</button>
  <div class="tip">发布后几秒内网站自动更新</div>

  <div id="status"></div>

</div>

<script>
const REPO = 'sawzhang/ai-diary';
const FILE = 'index.html';

// 初始化
window.onload = () => {
  const token = localStorage.getItem('gh_token');
  if (token) document.getElementById('tokenArea').style.display = 'none';

  // 默认今天
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('dateInput').value = `${yyyy}-${mm}-${dd}`;
};

function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return alert('请输入 Token');
  localStorage.setItem('gh_token', t);
  document.getElementById('tokenArea').style.display = 'none';
  showStatus('Token 已保存 ✓', 'success');
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
}

const WEEKDAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

async function publish() {
  const token = localStorage.getItem('gh_token');
  if (!token) { showStatus('请先保存 GitHub Token', 'error'); return; }

  const dateVal = document.getElementById('dateInput').value;
  const sig = document.getElementById('sigInput').value.trim() || '人类Laura';
  const raw = document.getElementById('content').value.trim();

  if (!dateVal) { showStatus('请选择日期', 'error'); return; }
  if (!raw) { showStatus('内容不能为空', 'error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  showStatus('正在发布…', 'loading');

  // 格式化日期
  const d = new Date(dateVal + 'T12:00:00');
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const wd = WEEKDAYS[d.getDay()];
  const dateLabel = `${yyyy} · ${mm} · ${dd} &nbsp;${wd}${sig !== '遥远的虾' ? ' · ' + sig : ''}`;

  // 正文转 HTML
  const paragraphs = raw.split(/\n+/).filter(l => l.trim())
    .map(l => `      <p>${l.trim()}</p>`).join('\n');

  const entry = `  <article class="entry">
    <div class="entry-date">${dateLabel}</div>
    <div class="entry-body">
${paragraphs}
    </div>
    <div class="entry-sig">—— ${sig}</div>
  </article>\n\n`;

  try {
    // 获取当前文件
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error('获取文件失败，请检查 Token 是否有效');
    const data = await res.json();
    const sha = data.sha;
    const current = atob(data.content.replace(/\n/g,''));

    // 插入新条目
    const marker = '<div class="container" id="entries">\n';
    const idx = current.indexOf(marker);
    if (idx === -1) throw new Error('页面结构异常，无法插入');
    const newContent = current.slice(0, idx + marker.length) + '\n' + entry + current.slice(idx + marker.length);

    // 提交
    const putRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      method: 'PUT',
      headers: {
        Authorization: `token ${token}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `diary: ${yyyy}-${mm}-${dd} ${sig}`,
        content: btoa(unescape(encodeURIComponent(newContent))),
        sha
      })
    });
    if (!putRes.ok) {
      const err = await putRes.json();
      throw new Error(err.message || '提交失败');
    }

    showStatus('✓ 发布成功！几秒后网站自动更新', 'success');
    document.getElementById('content').value = '';
    setTimeout(() => window.location.href = '/', 2500);

  } catch(e) {
    showStatus('❌ ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}
</script>

</body>
</html>
